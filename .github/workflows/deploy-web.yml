name: Deploy Web

# Builds and deploys both web properties to Netlify on every push to main.
#
# Apps deployed:
#   - apps/landing → snipotter.com (marketing site + /yenilikler page)
#   - apps/web     → app.snipotter.com (browser-only Snipotter)
#
# Required repository secrets (one-time setup):
#   NETLIFY_AUTH_TOKEN        — Personal Access Token from Netlify
#                               (https://app.netlify.com/user/applications#personal-access-tokens)
#   NETLIFY_LANDING_SITE_ID   — Site ID for the landing site (Netlify dashboard
#                               → Site → Site configuration → Site information)
#   NETLIFY_WEB_SITE_ID       — Site ID for the web app site
#
# Supabase credentials are reused from the existing desktop-app secrets
# (MAIN_VITE_SUPABASE_URL / MAIN_VITE_SUPABASE_ANON_KEY) and re-exposed to
# Next.js with NEXT_PUBLIC_ prefix at build time below — no duplicate secrets needed.
#
# Each app is built+deployed in its own job so a failure in one doesn't block
# the other. Skip deploy on PRs from forks (no secrets) — preview deploys can
# be added later via Netlify's native GitHub integration if needed.

on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - 'apps/web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  landing:
    name: Deploy landing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/landing/package-lock.json

      - name: Install
        working-directory: apps/landing
        run: npm ci

      - name: Build
        working-directory: apps/landing
        run: npm run build

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: apps/landing/dist
          production-deploy: true
          deploy-message: ${{ github.event.head_commit.message }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_LANDING_SITE_ID }}

  web:
    name: Deploy web app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.MAIN_VITE_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.MAIN_VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: apps/web/out
          production-deploy: true
          deploy-message: ${{ github.event.head_commit.message }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_WEB_SITE_ID }}
