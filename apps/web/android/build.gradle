// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Force every Android library subproject (Capacitor plugins, send-intent,
// cordova bridge) to compile against the same SDK as the app. Without this
// override, send-intent v7 ships with compileSdkVersion 35 hardcoded, which
// conflicts with androidx.core 1.17.0 (requires consumers to compile against
// 36+). Re-evaluating after the plugin is applied is the canonical workaround.
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty("android")) {
            project.android {
                compileSdkVersion rootProject.ext.compileSdkVersion
            }
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
